<!DOCTYPE html>
<html lang="sv">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Handelsplattform</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

<style>

:root{
--bg:#050505;
--surface:#121212;
--border:#282828;
--accent:#2962ff;
--up:#00ffaa;
--down:#ff3d71;
--text:#ffffff;
--text-dim:#b3b3b3;
}

body{
font-family:'Inter',-apple-system,sans-serif;
background:var(--bg);
color:var(--text);
margin:0;
display:grid;
grid-template-columns:350px 1fr 300px;
height:100vh;
overflow:hidden;
}

.market-side{
display:grid;
grid-template-rows:auto 1fr;
background:var(--surface);
border-right:1px solid var(--border);
}

.search-box{
padding:15px;
border-bottom:1px solid var(--border);
}

input{
width:100%;
background:#1e1e1e;
border:1px solid var(--border);
padding:10px;
color:white;
border-radius:4px;
}

.stock-item{
padding:12px 15px;
border-bottom:1px solid var(--border);
cursor:pointer;
display:flex;
justify-content:space-between;
}

.stock-item:hover{
background:#1a1a1a;
}

.stock-item.active{
background:#222;
border-left:3px solid var(--accent);
}

.main-content{
display:flex;
flex-direction:column;
padding:20px;
}

.chart-container{
flex-grow:1;
position:relative;
}

.trade-side{
border-left:1px solid var(--border);
padding:20px;
background:var(--surface);
}

.btn{
width:100%;
padding:10px;
border:none;
margin-top:8px;
cursor:pointer;
font-weight:bold;
}

.btn-buy{
background:var(--up);
color:black;
}

.btn-sell{
background:var(--down);
color:white;
}

.up{color:var(--up);}
.down{color:var(--down);}

</style>

</head>

<body>

<div class="market-side">

<div class="search-box">

<input
id="searchInput"
placeholder="Sök aktie..."
oninput="filtreraAktier()">

</div>

<div id="stockList"></div>

</div>

<div class="main-content">

<h2 id="activeSymbol">Välj en aktie</h2>

<h1 id="activePrice">0.00</h1>

<div class="chart-container">
<canvas id="mainChart"></canvas>
</div>

</div>

<div class="trade-side">

<div>

<div style="color:var(--text-dim)">
Saldo
</div>

<div id="balanceDisplay"
style="font-size:1.4rem;font-weight:bold;">
100000
</div>

</div>

<div id="tradeControls" style="display:none;">

<label>ANTAL</label>

<input
id="tradeAmount"
type="number"
value="1"
min="1">

<button class="btn btn-buy"
onclick="genomförAffär('köp')">
KÖP
</button>

<button class="btn btn-sell"
onclick="genomförAffär('sälj')">
SÄLJ
</button>

</div>

<div id="portfolioDisplay"></div>

</div>

<script>

const symboler=[
"AAPL","MSFT","NVDA","TSLA","AMZN"
];

let aktier={};
let aktivAktie=null;
let saldo=100000;
let portfölj={};
let chart=null;

const CHART_WINDOW_MS=3*60*1000;
const MAX_CANDLES=120;

/* init */

symboler.forEach(s=>{

let pris=Math.random()*500+100;

aktier[s]={
ticker:s,
pris:pris,
history:[]
};

});

/* portfolio click */

function väljAktieFrånPortfölj(t){

väljAktie(t);

document.getElementById("tradeAmount").value=1;

}

/* stocks */

function renderStockList(){

let c=document.getElementById("stockList");

c.innerHTML="";

Object.keys(aktier).forEach(s=>{

let d=document.createElement("div");

d.className=
"stock-item"+(aktivAktie==s?" active":"");

d.onclick=()=>väljAktie(s);

d.innerHTML=
`<b>${s}</b>
<span>${aktier[s].pris.toFixed(2)}</span>`;

c.appendChild(d);

});

}

function väljAktie(s){

aktivAktie=s;

document.getElementById("tradeControls")
.style.display="block";

document.getElementById("activeSymbol")
.innerText=s;

initChart();

renderStockList();

}

/* chart */

function sättDiagramTidsfönster(){

if(!chart)return;

let data=aktier[aktivAktie].history;

if(!data.length)return;

let nu=Date.now();

chart.options.scales.x.min=
nu-CHART_WINDOW_MS;

chart.options.scales.x.max=
nu;

}

function initChart(){

let ctx=
document.getElementById("mainChart");

if(chart) chart.destroy();

chart=new Chart(ctx,{

type:"candlestick",

data:{
datasets:[{
data:aktier[aktivAktie].history
}]
},

options:{
animation:false,
responsive:true,
plugins:{
legend:{display:false}
},
scales:{
x:{type:"time"},
y:{}
}

}

});

}

/* trading */

function genomförAffär(typ){

let antal=
parseInt(
document.getElementById("tradeAmount").value
);

if(!antal)return;

let pris=aktier[aktivAktie].pris;

if(typ=="köp"){

let kostnad=pris*antal;

if(saldo<kostnad)return;

saldo-=kostnad;

if(!portfölj[aktivAktie]){

portfölj[aktivAktie]={
antal:0,
totaltInköp:0
};

}

portfölj[aktivAktie].antal+=antal;

portfölj[aktivAktie].totaltInköp+=kostnad;

}

if(typ=="sälj"){

if(!portfölj[aktivAktie])return;

if(portfölj[aktivAktie].antal<antal)
return;

saldo+=pris*antal;

portfölj[aktivAktie].antal-=antal;

if(portfölj[aktivAktie].antal==0)
delete portfölj[aktivAktie];

}

uppdateraPortfölj();

}

/* portfolio */

function uppdateraPortfölj(){

document.getElementById("balanceDisplay")
.innerText=saldo.toFixed(0)+" SEK";

let c=
document.getElementById("portfolioDisplay");

c.innerHTML="<h3>PORTFÖLJ</h3>";

for(let s in portfölj){

let antal=portfölj[s].antal;

c.innerHTML+=`

<div onclick="väljAktieFrånPortfölj('${s}')"
style="padding:8px;
border-bottom:1px solid #222;
cursor:pointer;">

<b>${s}</b>
(${antal})

<div style="display:flex;gap:4px;margin-top:4px;">

<button onclick="
event.stopPropagation();
väljAktie('${s}');
document.getElementById('tradeAmount').value=1;
genomförAffär('köp');
">+</button>

<button onclick="
event.stopPropagation();
väljAktie('${s}');
document.getElementById('tradeAmount').value=1;
genomförAffär('sälj');
">-</button>

</div>

</div>

`;

}

}

/* live price */

setInterval(()=>{

Object.keys(aktier).forEach(s=>{

let old=aktier[s].pris;

let newP=
old*(1+(Math.random()-0.5)*0.01);

aktier[s].pris=newP;

aktier[s].history.push({

x:Date.now(),
o:old,
h:Math.max(old,newP),
l:Math.min(old,newP),
c:newP

});

if(aktier[s].history.length>
MAX_CANDLES)
aktier[s].history.shift();

});

if(aktivAktie){

chart.data.datasets[0].data=
aktier[aktivAktie].history;

sättDiagramTidsfönster();

chart.update();

}

uppdateraPortfölj();

},2000);

renderStockList();

</script>

</body>
</html>
