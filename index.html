    <script>
    const SUPABASE_URL = 'https://jdpwqtoltrkrflopvicr.supabase.co';

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    const loggedOutView = document.getElementById('logged-out-view');
    const loggedInView = document.getElementById('logged-in-view');
    const loginButton = loggedOutView.querySelector('.login-button');
    const profileBtn = document.getElementById('profileBtn');

       let cachedFxRate = null;
const priceCache = new Map();

async function getExchangeRate() {
    if (cachedFxRate) return cachedFxRate;
    try {
        const response = await fetch('https://server-api-092b.onrender.com/api/config');
        const data = await response.json();
        cachedFxRate = Number(data?.usdToSek) || 1;
        return cachedFxRate;
    } catch (e) {
        console.error('[Competitions] FX fetch failed:', e);
        cachedFxRate = 1; // fallback
        return cachedFxRate;
    }
}

function extractTicker(symbolLabel) {
    if (!symbolLabel) return '';
    if (symbolLabel.includes('(')) {
        return symbolLabel.split('(')[1].replace(')', '').trim();
    }
    return symbolLabel.trim();
}

async function fetchPriceUsd(symbolLabel) {
    const ticker = extractTicker(symbolLabel);
    if (!ticker) return 0;

    if (priceCache.has(ticker)) return priceCache.get(ticker);

    try {
        const response = await fetch(`https://server-api-092b.onrender.com/api/price/${encodeURIComponent(ticker)}`);
        if (!response.ok) return 0;
        const data = await response.json();
        const price = Number(data?.c) || 0;
        priceCache.set(ticker, price);
        return price;
    } catch (e) {
        console.error(`[Competitions] Price fetch failed for ${ticker}:`, e);
        return 0;
    }
}

async function getMemberTotalValueSek(member, fxRate) {
    const balance = Number(member?.balance || 0);
    const portfolio = member?.portfolio || {};
    let holdingsValueSek = 0;

    for (const [symbol, holding] of Object.entries(portfolio)) {
        const amount = Number(holding?.antal || 0);
        if (amount <= 0) continue;

        const priceUsd = await fetchPriceUsd(symbol);
        holdingsValueSek += amount * priceUsd * fxRate;
    }

    return balance + holdingsValueSek;
}

    // --- Auth Logic ---
    async function signIn() {
        setAuthError('');
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        if (!email || !password) { setAuthError('Vänligen fyll i både e-post och lösenord.'); return; }
        console.log('[Auth] Attempting sign in for:', email);
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) {
            console.error('[Auth] Sign in error:', error.message);
            setAuthError('Fel e-post eller lösenord. Försök igen!');
        } else {
            console.log('[Auth] Sign in successful, closing modal and loading competitions');
            showAuthModal(false);
            // Immediately load competitions for the newly logged in user
            if (data?.user) {
                currentUser = data.user;
                await loadUserCompetitions();
            }
        }
    }

    async function signUp() {
        setAuthError('');
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        if (!email || !password) { setAuthError('Du måste fylla i e-post och lösenord för att skapa konto.'); return; }
        if (password.length < 8) { setAuthError('Lösenordet måste vara minst 8 tecken långt.'); return; }
        console.log('[Auth] Attempting sign up for:', email);
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        if (error) { setAuthError('Kunde inte skapa konto: ' + error.message); return; }
        if (data?.session) { showAuthModal(false); }
        else { setAuthError('Kontot skapat, men inloggning misslyckades. Prova att logga in.'); }
    }

    async function handleLogout() {
        console.log('[Auth] Logging out');
        await supabaseClient.auth.signOut();
    }

    function setAuthError(msg) { authError.innerText = msg || ''; }

    // --- Event Listeners ---
    loginButton.addEventListener('click', () => { setAuthError(''); showAuthModal(true); });
    logoutButton.addEventListener('click', handleLogout);
    profileBtn.addEventListener('click', (e) => { e.stopPropagation(); profileDropdown.classList.toggle('show'); });
    document.addEventListener('click', (e) => { if (!loggedInView.contains(e.target)) profileDropdown.classList.remove('show'); });

    // --- Supabase Auth Listener ---
    async function setupAuthListener() {
        console.log('[Auth] Getting initial session...');
        const { data: { session } } = await supabaseClient.auth.getSession();

        if (session?.user) {
            console.log('[Auth] Initial session found:', session.user.email);
            showLoggedInUI(session.user);
            await loadUserCompetitions();
        } else {
            console.log('[Auth] No initial session found');
            showLoggedOutUI();
        }

        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            console.log('[Auth] onAuthStateChange event:', event, '| user:', session?.user?.email ?? 'none');

            // TOKEN_REFRESHED just means the JWT was silently refreshed — UI is already correct
            if (event === 'TOKEN_REFRESHED') {
                console.log('[Auth] TOKEN_REFRESHED — skipping UI update');
                return;
            }

            if (event === 'SIGNED_IN' && session?.user) {
                // Only re-run UI+data load if currentUser changed (avoids double-run on page load)
                if (currentUser?.id === session.user.id && competitionsLoaded) {
                    console.log('[Auth] SIGNED_IN for same user with competitions already loaded — skipping duplicate load');
                    return;
                }
                console.log('[Auth] New SIGNED_IN — loading UI and competitions');
                showLoggedInUI(session.user);
                competitionsLoaded = false;
                await loadUserCompetitions();
            } else if (event === 'SIGNED_OUT') {
                console.log('[Auth] SIGNED_OUT — resetting UI');
                showLoggedOutUI();
                // Reset competition lists to show login prompts
                const activeEl = document.getElementById('activeCompetitions');
                const finishedEl = document.getElementById('finishedCompetitions');
                if (activeEl) {
                    activeEl.innerHTML = `
                        <div class="no-competitions">
                            <div style="margin-bottom: 15px;">Inga aktiva tävlingar</div>
                            <div id="loginPromptActive" style="display: block; color: var(--text-dim); font-size: 0.9rem; line-height: 1.4;">
                                <div style="margin-bottom: 10px;">Logga in för att se dina tävlingar och delta i nya.</div>
                                <button class="login-button" onclick="showAuthModal(true)" style="margin-top: 10px;">Logga in för att tävla</button>
                            </div>
                        </div>
                    `;
                }
                if (finishedEl) {
                    finishedEl.innerHTML = `
                        <div class="no-competitions">
                            <div style="margin-bottom: 15px;">Inga avslutade tävlingar</div>
                            <div id="loginPromptFinished" style="display: block; color: var(--text-dim); font-size: 0.9rem; line-height: 1.4;">
                                <div style="margin-bottom: 10px;">Logga in för att se dina tidigare tävlingar och resultat.</div>
                                <button class="login-button" onclick="showAuthModal(true)" style="margin-top: 10px;">Logga in för att se historik</button>
                            </div>
                        </div>
                    `;
                }
            }
        });
    }

    // Re-sync UI when tab becomes visible again
    document.addEventListener('visibilitychange', async () => {
        if (document.hidden) return;
        console.log('[Tab] Tab became active again');

        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session?.user) {
            console.log('[Tab] No session on tab return — showing logged out');
            showLoggedOutUI();
            return;
        }

        // Always re-sync UI in case it got stale
        console.log('[Tab] Session valid on tab return, re-syncing UI for:', session.user.email);
        showLoggedInUI(session.user);

        // Re-load competitions in case data changed while away
        competitionsLoaded = false;
        await loadUserCompetitions();
    });

    document.addEventListener('DOMContentLoaded', setupAuthListener);

    // --- Game Modal ---
    function showGameModal(show) {
        console.log('[GameModal] showGameModal called, show:', show, '| currentUser:', currentUser?.email ?? 'none');
        if (show && !currentUser) {
            console.warn('[GameModal] No currentUser — showing auth modal instead');
            setAuthError('Du måste vara inloggad för att starta eller gå med i en tävling.');
            showAuthModal(true);
            return;
        }
        document.getElementById('gameModal').style.display = show ? 'flex' : 'none';
        if (show) {
            setGameError('');
            setCurrentSwedishDateTime(); // Set current Swedish date/time when opening modal
        }
    }

    function switchGameTab(tab) {
        const tabs = document.querySelectorAll('.game-tab');
        const contents = document.querySelectorAll('.game-tab-content');
        tabs.forEach(t => t.classList.remove('active'));
        contents.forEach(c => c.classList.remove('active'));
        if (tab === 'create') {
            tabs[0].classList.add('active');
            document.getElementById('createTab').classList.add('active');
        } else {
            tabs[1].classList.add('active');
            document.getElementById('joinTab').classList.add('active');
        }
        setGameError('');
    }

    function setGameError(msg) { document.getElementById('gameError').innerText = msg || ''; }

    // Function to set current Swedish date and time in the form
    function setCurrentSwedishDateTime() {
        const now = new Date();
        // Swedish timezone (Europe/Stockholm)
        const swedishTime = new Date(now.toLocaleString("en-US", {timeZone: "Europe/Stockholm"}));
        
        // Format date as YYYY-MM-DD
        const year = swedishTime.getFullYear();
        const month = String(swedishTime.getMonth() + 1).padStart(2, '0');
        const day = String(swedishTime.getDate()).padStart(2, '0');
        const dateString = `${year}-${month}-${day}`;
        
        // Format time as HH:MM
        const hours = String(swedishTime.getHours()).padStart(2, '0');
        const minutes = String(swedishTime.getMinutes()).padStart(2, '0');
        const timeString = `${hours}:${minutes}`;
        
        // Set the form values
        const endDateInput = document.getElementById('gameEndDate');
        const endTimeInput = document.getElementById('gameEndTime');
        
        if (endDateInput) {
            endDateInput.value = dateString;
            endDateInput.min = dateString; // Can't select past dates
        }
        if (endTimeInput) {
            endTimeInput.value = timeString;
        }
    }

    async function createGame() {
        setGameError('');
        const name = document.getElementById('gameName').value.trim();
        const endDate = document.getElementById('gameEndDate').value;
        const endTime = document.getElementById('gameEndTime').value;
        const balance = document.getElementById('gameBalance').value;

        if (!name) { setGameError('Ange ett namn på tävlingen.'); return; }
        if (!endDate || !endTime) { setGameError('Välj slutdatum och sluttid.'); return; }
        if (!balance) { setGameError('Ange startkapital.'); return; }
        
        // Combine date and time and convert to Swedish timezone
        const endDateTime = new Date(`${endDate}T${endTime}:00`);
        const swedishEndTime = new Date(endDateTime.toLocaleString("en-US", {timeZone: "Europe/Stockholm"}));
        
        // Check if end time is in the future
        const now = new Date();
        const swedishNow = new Date(now.toLocaleString("en-US", {timeZone: "Europe/Stockholm"}));
        if (swedishEndTime <= swedishNow) {
            setGameError('Sluttiden måste vara i framtiden.'); return;
        }

        console.log('[Game] Creating game:', { name, endDate, endTime, balance, userId: currentUser?.id });

        try {
            const inviteCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            const startTime = new Date().toISOString();
            const endTimeISO = swedishEndTime.toISOString();

            const { data, error } = await supabaseClient
                .from('leagues')
                .insert({ name, creator_id: currentUser.id, starting_balance: parseFloat(balance), start_time: startTime, end_time: endTimeISO, invite_code: inviteCode })
                .select().single();

            if (error) throw error;
            console.log('[Game] League created:', data.id, '| code:', inviteCode);

            const { error: memberError } = await supabaseClient
                .from('league_members')
                .insert({ league_id: data.id, user_id: currentUser.id, balance: parseFloat(balance), portfolio: {} });

            if (memberError) throw memberError;
            console.log('[Game] Creator added as member, redirecting...');

            window.location.href = `game.html?league=${data.id}&code=${inviteCode}`;
        } catch (error) {
            console.error('[Game] createGame error:', error);
            setGameError('Kunde inte skapa tävling. Försök igen.');
        }
    }

    async function joinGame() {
        setGameError('');
        const code = document.getElementById('gameCode').value.trim().toUpperCase();
        if (!code) { setGameError('Ange en tävlingskod.'); return; }

        console.log('[Game] Joining game with code:', code, '| userId:', currentUser?.id);

        try {
            const { data: league, error } = await supabaseClient.from('leagues').select('*').eq('invite_code', code).single();
            if (error || !league) { setGameError('Hittade ingen tävling med den koden.'); return; }

            const { data: existingMember } = await supabaseClient.from('league_members').select('*').eq('league_id', league.id).eq('user_id', currentUser.id).maybeSingle();
            if (existingMember) {
                console.log('[Game] Already a member, redirecting');
                window.location.href = `game.html?league=${league.id}&code=${code}`;
                return;
            }

            const { error: memberError } = await supabaseClient.from('league_members').insert({ league_id: league.id, user_id: currentUser.id, balance: league.starting_balance, portfolio: {} });
            if (memberError) throw memberError;

            console.log('[Game] Joined league, redirecting');
            window.location.href = `game.html?league=${league.id}&code=${code}`;
        } catch (error) {
            console.error('[Game] joinGame error:', error);
            setGameError('Kunde inte gå med i tävling. Försök igen.');
        }
    }

    // --- Competition List ---
    function switchCompetitionTab(tab) {
        const tabs = document.querySelectorAll('.competition-tab');
        const activeList = document.getElementById('activeCompetitions');
        const finishedList = document.getElementById('finishedCompetitions');
        tabs.forEach(t => t.classList.remove('active'));
        if (tab === 'active') {
            tabs[0].classList.add('active');
            activeList.style.display = 'block';
            finishedList.style.display = 'none';
        } else {
            tabs[1].classList.add('active');
            activeList.style.display = 'none';
            finishedList.style.display = 'block';
        }
    }

    async function loadUserCompetitions() {
        if (!currentUser) {
            console.warn('[Competitions] loadUserCompetitions called with no currentUser — aborting');
            return;
        }
        console.log('[Competitions] Loading competitions for:', currentUser.email);

        try {
            const { data: memberships, error: memberError } = await supabaseClient
                .from('league_members').select('league_id').eq('user_id', currentUser.id);

            if (memberError) throw memberError;
            console.log('[Competitions] Memberships found:', memberships?.length ?? 0);

            if (!memberships || memberships.length === 0) {
                document.getElementById('activeCompetitions').innerHTML = '<div class="no-competitions">Inga aktiva tävlingar</div>';
                document.getElementById('finishedCompetitions').innerHTML = '<div class="no-competitions">Inga avslutade tävlingar</div>';
                return;
            }

            const leagueIds = memberships.map(m => m.league_id);
            const { data: leagues, error: leagueError } = await supabaseClient
                .from('leagues').select('*').in('id', leagueIds).order('created_at', { ascending: false });

            if (leagueError) throw leagueError;
            console.log('[Competitions] Leagues fetched:', leagues?.length ?? 0);

            const now = new Date();
            const activeCompetitions = leagues.filter(l => new Date(l.end_time) > now);
            const finishedCompetitions = leagues.filter(l => new Date(l.end_time) <= now);
            console.log('[Competitions] Active:', activeCompetitions.length, '| Finished:', finishedCompetitions.length);

            renderCompetitions('activeCompetitions', activeCompetitions, true);
            renderCompetitions('finishedCompetitions', finishedCompetitions, false);
            competitionsLoaded = true;

        } catch (error) {
            console.error('[Competitions] loadUserCompetitions error:', error);
            document.getElementById('activeCompetitions').innerHTML = '<div class="no-competitions">Kunde inte ladda tävlingar</div>';
            document.getElementById('finishedCompetitions').innerHTML = '<div class="no-competitions">Kunde inte ladda tävlingar</div>';
        }
    }

    async function renderCompetitions(containerId, competitions, isActive) {
        const container = document.getElementById(containerId);
        if (competitions.length === 0) {
            container.innerHTML = `<div class="no-competitions">Inga ${isActive ? 'aktiva' : 'avslutade'} tävlingar</div>`;
            return;
        }

        const competitionsWithData = await Promise.all(competitions.map(async (league) => {
    try {
        const fxRate = await getExchangeRate();

        const { data: memberData } = await supabaseClient
            .from('league_members')
            .select('*')
            .eq('league_id', league.id)
            .eq('user_id', currentUser.id)
            .single();

        const { data: allMembers } = await supabaseClient
            .from('league_members')
            .select('user_id, balance, portfolio')
            .eq('league_id', league.id);

        const allValues = await Promise.all((allMembers || []).map(m => getMemberTotalValueSek(m, fxRate)));
        const userValue = await getMemberTotalValueSek(memberData, fxRate);

        const sortedValues = [...allValues].sort((a, b) => b - a);
        const placement = sortedValues.indexOf(userValue) + 1;
        const totalPlayers = sortedValues.length;

        console.log(`[Competitions] League "${league.name}" — userValue: ${userValue.toFixed(0)}, placement: ${placement}/${totalPlayers}`);

        return { ...league, placement, totalPlayers, portfolioValue: userValue };
    } catch (err) {
        console.error(`[Competitions] Error getting data for league ${league.id}:`, err);
        return { ...league, placement: '-', totalPlayers: '-', portfolioValue: 0 };
    }
}));
        container.innerHTML = competitionsWithData.map(league => `
            <div class="competition-item">
                <div class="competition-info">
                    <div class="competition-name">${league.name}</div>
                    <div class="competition-stats">
                        <div class="competition-stat">
                            <div class="stat-label">PLACERING</div>
                            <div class="stat-value placement-value">${league.placement}/${league.totalPlayers}</div>
                        </div>
                        <div class="competition-stat">
                            <div class="stat-label">PORTFÖLJVÄRDE</div>
                            <div class="stat-value portfolio-value">${Number(league.portfolioValue).toLocaleString('sv-SE', { maximumFractionDigits: 0 })} SEK</div>
                        </div>
                    </div>
                </div>
                <button class="join-competition-btn" onclick="joinCompetition('${league.id}', '${league.invite_code}')">
                    ${isActive ? 'Gå till tävling' : 'Visa resultat'}
                </button>
            </div>
        `).join('');
    }

    async function joinCompetition(leagueId, inviteCode) {
        console.log('[Competitions] joinCompetition clicked, leagueId:', leagueId, '| currentUser:', currentUser?.email ?? 'none');
        if (!currentUser) {
            console.warn('[Competitions] No currentUser — cannot navigate');
            setAuthError('Du måste vara inloggad.');
            showAuthModal(true);
            return;
        }
        window.location.href = `game.html?league=${leagueId}&code=${inviteCode}`;
    }
</script>
