
<!DOCTYPE html>
<html lang="sv">
<head>
   
<link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
<link rel="manifest" href="assets/icons/site.webmanifest">
   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperAlpha</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --border: #282828;
            --accent: #2962ff;
            --up: #00ffaa;
            --down: #ff3d71;
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #0a0a0a 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .logo-link {
            text-decoration: none;
            color: var(--text);
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--accent), var(--up));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile-section {
            position: relative;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .new-competition-btn {
            background: linear-gradient(45deg, var(--accent), var(--up));
            color: var(--text);
            border: none;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .new-competition-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(41, 98, 255, 0.3);
        }
        
        .login-button {
             background: none;
             border: 1px solid var(--accent);
             color: var(--text);
             font-size: 0.9rem;
             font-weight: 600;
             cursor: pointer;
             padding: 8px 16px;
             border-radius: 20px;
             transition: all 0.2s ease;
        }

        .login-button:hover {
             background: var(--accent);
        }


        .profile-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1e1e1e;
            border: 1px solid var(--border);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .profile-btn:hover {
            border-color: var(--accent);
            transform: scale(1.05);
        }

 .profile-dropdown {
    position: absolute;
    top: 50px;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 15px;
    min-width: 220px;
    width: max-content;
    max-width: 320px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    display: flex;              /* CHANGE */
    flex-direction: column;    /* KEEP */
    z-index: 1001;
    visibility: hidden;        /* NEW */
    opacity: 0;                /* NEW */
}

.profile-dropdown.show {
    visibility: visible;       /* CHANGE */
    opacity: 1;                /* NEW */
}

      .profile-email {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 15px;
    white-space: nowrap;
    overflow: hidden;          /* NEW */
    text-overflow: ellipsis;   /* NEW */
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
}

        .logout-btn {
            width: 100%;
            padding: 8px;
            background: var(--down);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        .logout-btn:hover {
            background: #ff2951;
        }

        .container {
            max-width: 1200px;
            padding: 0 20px;
            margin-top: 80px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }


        .competitions-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .competitions-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--accent), var(--up));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .competition-tabs {
            display: flex;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
        }

        .competition-tab {
            padding: 10px 20px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .competition-tab.active {
            background: var(--accent);
            color: var(--text);
        }

        .competitions-list {
            width: 100%;
            max-width: 800px;
            flex: 1;
            overflow-y: auto;
            padding: 0 20px;
        }

        .competition-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .competition-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .competition-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .competition-name {
            font-size: 1.3rem;
            font-weight: 600;
            flex: 1;
        }

        .competition-stats {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .competition-stat {
            text-align: center;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .placement-value {
            color: var(--accent);
        }

        .portfolio-value {
            color: var(--up);
        }

        .join-competition-btn {
            background: var(--accent);
            color: var(--text);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .join-competition-btn:hover {
            background: #1e5ba8;
        }

        .no-competitions {
            text-align: center;
            color: var(--text-dim);
            padding: 60px 20px;
            font-size: 1.1rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, var(--accent), var(--up));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-bottom: 3rem;
            font-weight: 400;
        }

        .start-button {
            background: linear-gradient(45deg, var(--accent), var(--up));
            color: var(--text);
            border: none;
            padding: 20px 60px;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(41, 98, 255, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .start-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(41, 98, 255, 0.4);
        }
        
        /* Auth Modal Styles */
        .auth-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
            display: none; /* Hidden by default */
        }

        .auth-card {
            width: min(400px, 92vw);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .auth-title {
            margin: 0 0 25px 0;
            text-align: center;
            font-size: 1.5rem;
        }
        
        .auth-card input {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid var(--border);
            padding: 12px;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        #authError {
            margin: 15px 0;
            min-height: 20px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--down);
        }

        .auth-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .auth-actions .btn {
            width: 100%;
            margin-top: 0;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-buy { background: var(--up); color: black; }
        .btn-sell { background: var(--down); color: white; }

        /* Game Modal Styles */
        .game-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
            display: none;
        }

        .game-card {
            width: min(500px, 92vw);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .game-title {
            margin: 0 0 25px 0;
            text-align: center;
            font-size: 1.5rem;
        }

        .game-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
        }

        .game-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .game-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .game-tab-content {
            display: none;
        }

        .game-tab-content.active {
            display: block;
        }

        .game-card input {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid var(--border);
            padding: 12px;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .game-card label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .game-card select {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid var(--border);
            padding: 12px;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            margin-top: 5px;
        }

        #gameError {
            margin: 15px 0;
            min-height: 20px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--down);
        }

    </style>
</head>
<body>
    <div class="top-banner">
        <a href="index.html" class="logo-link">PaperAlpha</a>
        <div class="profile-section">
            <div id="new-competition-section" style="display: none;">
                <button class="new-competition-btn" onclick="showGameModal(true)">Ny Tävling</button>
            </div>
            <div id="logged-out-view">
                <button class="login-button">Logga in</button>
            </div>
            <div id="logged-in-view" style="display: none;">
                <button class="profile-btn" id="profileBtn">
                    <span id="profileInitial"></span>
                </button>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-email" id="profileEmail"></div>
                    <button class="logout-btn">Logga ut</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="competitions-header">
            <h1 class="competitions-title">Mina Tävlingar</h1>
            <div class="competition-tabs">
                <button class="competition-tab active" onclick="switchCompetitionTab('active')">Aktiva</button>
                <button class="competition-tab" onclick="switchCompetitionTab('finished')">Avslutade</button>
            </div>
        </div>

        <div id="activeCompetitions" class="competitions-list">
            <div class="no-competitions">Inga aktiva tävlingar</div>
        </div>

        <div id="finishedCompetitions" class="competitions-list" style="display: none;">
            <div class="no-competitions">Inga avslutade tävlingar</div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="auth-modal">
        <div class="auth-card">
            <h3 class="auth-title">PaperAlpha</h3>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPassword" placeholder="Lösenord">
            <div id="authError"></div>
            <div class="auth-actions">
                <button class="btn btn-buy" onclick="signIn()">LOGGA IN</button>
                <button class="btn btn-sell" onclick="signUp()">REGISTRERA</button>
            </div>
             <button onclick="showAuthModal(false)" style="background:none; border:none; color:var(--text-dim); cursor:pointer; margin-top: 20px; width:100%; text-align:center;">Avbryt</button>
        </div>
    </div>

    <!-- Game Modal -->
    <div id="gameModal" class="game-modal">
        <div class="game-card">
            <h3 class="game-title">Tävling</h3>
            
            <div class="game-tabs">
                <button class="game-tab active" onclick="switchGameTab('create')">SKAPA</button>
                <button class="game-tab" onclick="switchGameTab('join')">GÅ MED</button>
            </div>

            <div id="createTab" class="game-tab-content active">
                <label>Namn på tävling</label>
                <input type="text" id="gameName" placeholder="Ange namn på tävling">
                
                <label>Längd</label>
                <select id="gameDuration">
                    <option value="60">1 timme</option>
                    <option value="180">3 timmar</option>
                    <option value="1440">1 dag</option>
                    <option value="4320">3 dagar</option>
                    <option value="10080">1 vecka</option>
                </select>
                
                <label>Startkapital (SEK)</label>
                <input type="number" id="gameBalance" value="10000" min="1000" max="1000000" step="1000">
                
                <div id="gameError"></div>
                
                <button class="btn btn-buy" onclick="createGame()" style="margin-top: 20px;">SKAPA TÄVLING</button>
            </div>

            <div id="joinTab" class="game-tab-content">
                <label>Tävlingskod</label>
                <input type="text" id="gameCode" placeholder="Ange tävlingskod">
                
                <div id="gameError"></div>
                
                <button class="btn btn-sell" onclick="joinGame()" style="margin-top: 20px;">GÅ MED I TÄVLING</button>
            </div>
            
            <button onclick="showGameModal(false)" style="background:none; border:none; color:var(--text-dim); cursor:pointer; margin-top: 20px; width:100%; text-align:center;">Avbryt</button>
        </div>
    </div>

    <script>
        // --- Supabase Setup ---
        const SUPABASE_URL = 'https://jdpwqtoltrkrflopvicr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkcHdxdG9sdHJrcmZsb3B2aWNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDYwMzUsImV4cCI6MjA5MTIyMjAzNX0.MfZrnYRgEHSJlL24DiyoXw7OZ5qXeBKww0BlS-XVW6A';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true
            }
        });

        // --- Element References ---
        const loggedOutView = document.getElementById('logged-out-view');
        const loggedInView = document.getElementById('logged-in-view');
        const loginButton = loggedOutView.querySelector('.login-button');
        
        const profileBtn = document.getElementById('profileBtn');
        const profileInitial = document.getElementById('profileInitial');
        const profileDropdown = document.getElementById('profileDropdown');
        const profileEmail = document.getElementById('profileEmail');
        const logoutButton = loggedInView.querySelector('.logout-btn');

        const authModal = document.getElementById('authModal');
        const authError = document.getElementById('authError');

        let currentUser = null;

        // --- UI Functions ---
        function showAuthModal(show) {
            authModal.style.display = show ? 'flex' : 'none';
        }

        function showLoggedInUI(user) {
            loggedOutView.style.display = 'none';
            loggedInView.style.display = 'flex';
            document.getElementById('new-competition-section').style.display = 'block';
            profileEmail.textContent = user.email;
            profileInitial.textContent = user.email.charAt(0).toUpperCase();
            currentUser = user;
        }

        function showLoggedOutUI() {
            loggedOutView.style.display = 'block';
            loggedInView.style.display = 'none';
            document.getElementById('new-competition-section').style.display = 'none';
            profileDropdown.classList.remove('show');
            currentUser = null;
        }

        // --- Auth Logic ---
        async function signIn() {
            setAuthError('');
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value.trim();

            if (!email || !password) {
                setAuthError('Vänligen fyll i både e-post och lösenord.');
                return;
            }

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                setAuthError('Fel e-post eller lösenord. Försök igen!');
            } else {
                showAuthModal(false); // Close modal on success
            }
        }

        async function signUp() {
    setAuthError('');
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value.trim();

    if (!email || !password) {
        setAuthError('Du måste fylla i e-post och lösenord för att skapa konto.');
        return;
    }
    if (password.length < 8) {
        setAuthError('Lösenordet måste vara minst 8 tecken långt.');
        return;
    }

    const { data, error } = await supabaseClient.auth.signUp({ email, password });
    
    if (error) {
        setAuthError('Kunde inte skapa konto: ' + error.message);
        return;
    }

    // Om Confirm Email är avstängt i Supabase, kommer data.session finnas här
    if (data?.session) {
        // Succé! Användaren är nu inloggad.
        showAuthModal(false); // Stäng rutan direkt
        // Om du har en funktion för att ladda om användardata, kör den här, t.ex:
        // checkUser(); 
    } else {
        // Om session saknas betyder det oftast att kontot redan finns 
        // eller att verifiering fortfarande krävs i Supabase-inställningarna.
        setAuthError('Kontot skapat, men inloggning misslyckades. Prova att logga in.');
    }
}

        async function handleLogout() {
            await supabaseClient.auth.signOut();
        }
        
        function setAuthError(msg) {
            authError.innerText = msg || '';
        }

        // --- Event Listeners ---
        loginButton.addEventListener('click', () => {
            setAuthError('');
            showAuthModal(true);
        });

        logoutButton.addEventListener('click', handleLogout);

        profileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (!loggedInView.contains(e.target)) {
                profileDropdown.classList.remove('show');
            }
        });
        
        // --- Supabase Auth State Listener ---
        async function setupAuthListener() {
            // Get initial session
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session?.user) {
                showLoggedInUI(session.user);
                await loadUserCompetitions();
            } else {
                showLoggedOutUI();
            }

            // Listen for changes
            supabaseClient.auth.onAuthStateChange(async (event, session) => {
                if (session?.user) {
                    showLoggedInUI(session.user);
                    await loadUserCompetitions();
                } else {
                    showLoggedOutUI();
                }
            });
        }
        
        // --- Initial Load ---
        document.addEventListener('DOMContentLoaded', setupAuthListener);

        // --- Game Modal Functions ---
        function showGameModal(show) {
            if (show && !currentUser) {
                setAuthError('Du måste vara inloggad för att starta eller gå med i en tävling.');
                showAuthModal(true);
                return;
            }
            document.getElementById('gameModal').style.display = show ? 'flex' : 'none';
            if (show) {
                setGameError('');
            }
        }

        function switchGameTab(tab) {
            const tabs = document.querySelectorAll('.game-tab');
            const contents = document.querySelectorAll('.game-tab-content');
            
            tabs.forEach(t => t.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));
            
            if (tab === 'create') {
                tabs[0].classList.add('active');
                document.getElementById('createTab').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('joinTab').classList.add('active');
            }
            
            setGameError('');
        }

        function setGameError(msg) {
            document.getElementById('gameError').innerText = msg || '';
        }

        async function createGame() {
            setGameError('');
            
            const name = document.getElementById('gameName').value.trim();
            const duration = document.getElementById('gameDuration').value;
            const balance = document.getElementById('gameBalance').value;
            
            if (!name) {
                setGameError('Ange ett namn på tävlingen.');
                return;
            }
            
            if (!duration || !balance) {
                setGameError('Välj längd och startkapital.');
                return;
            }
            
            try {
                // Generate invite code
                const inviteCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                console.log('Generated invite code:', inviteCode);
                
                // Calculate end time
                const startTime = new Date().toISOString();
                const endTime = new Date(Date.now() + parseInt(duration) * 60 * 1000).toISOString();
                
                // Create league in Supabase
                const { data, error } = await supabaseClient
                    .from('leagues')
                    .insert({
                        name: name,
                        creator_id: currentUser.id,
                        starting_balance: parseFloat(balance),
                        start_time: startTime,
                        end_time: endTime,
                        invite_code: inviteCode
                    })
                    .select()
                    .single();
                
                if (error) throw error;
                
                console.log('League created successfully:', data);
                
                // Add creator as member
                const { error: memberError } = await supabaseClient
                    .from('league_members')
                    .insert({
                        league_id: data.id,
                        user_id: currentUser.id,
                        balance: parseFloat(balance),
                        portfolio: {}
                    });
                
                if (memberError) throw memberError;
                
                console.log('Member added successfully, redirecting to game...');
                
                // Redirect to game with league info
                window.location.href = `game.html?league=${data.id}&code=${inviteCode}`;
                
            } catch (error) {
                console.error('Create game error:', error);
                setGameError('Kunde inte skapa tävling. Försök igen.');
            }
        }

        async function joinGame() {
            setGameError('');
            
            const code = document.getElementById('gameCode').value.trim().toUpperCase();
            
            if (!code) {
                setGameError('Ange en tävlingskod.');
                return;
            }
            
            try {
                // Find league by invite code
                const { data: league, error } = await supabaseClient
                    .from('leagues')
                    .select('*')
                    .eq('invite_code', code)
                    .single();
                
                if (error || !league) {
                    setGameError('Hittade ingen tävling med den koden.');
                    return;
                }
                
                // Check if already a member
                const { data: existingMember } = await supabaseClient
                    .from('league_members')
                    .select('*')
                    .eq('league_id', league.id)
                    .eq('user_id', currentUser.id)
                    .maybeSingle();
                
                if (existingMember) {
                    // Already a member, redirect to game
                    window.location.href = `game.html?league=${league.id}&code=${code}`;
                    return;
                }
                
                // Add as new member
                const { error: memberError } = await supabaseClient
                    .from('league_members')
                    .insert({
                        league_id: league.id,
                        user_id: currentUser.id,
                        balance: league.starting_balance,
                        portfolio: {}
                    });
                
                if (memberError) throw memberError;
                
                // Redirect to game
                window.location.href = `game.html?league=${league.id}&code=${code}`;
                
            } catch (error) {
                console.error('Join game error:', error);
                setGameError('Kunde inte gå med i tävling. Försök igen.');
            }
        }

        // --- Competition Management Functions ---
        function switchCompetitionTab(tab) {
            const tabs = document.querySelectorAll('.competition-tab');
            const activeList = document.getElementById('activeCompetitions');
            const finishedList = document.getElementById('finishedCompetitions');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'active') {
                tabs[0].classList.add('active');
                activeList.style.display = 'block';
                finishedList.style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                activeList.style.display = 'none';
                finishedList.style.display = 'block';
            }
        }

        async function loadUserCompetitions() {
            if (!currentUser) return;
            
            try {
                // Get all leagues where user is a member
                const { data: memberships, error: memberError } = await supabaseClient
                    .from('league_members')
                    .select('league_id')
                    .eq('user_id', currentUser.id);
                
                if (memberError) throw memberError;
                
                if (!memberships || memberships.length === 0) {
                    // No competitions found
                    document.getElementById('activeCompetitions').innerHTML = '<div class="no-competitions">Inga aktiva tävlingar</div>';
                    document.getElementById('finishedCompetitions').innerHTML = '<div class="no-competitions">Inga avslutade tävlingar</div>';
                    return;
                }
                
                const leagueIds = memberships.map(m => m.league_id);
                
                // Get league details
                const { data: leagues, error: leagueError } = await supabaseClient
                    .from('leagues')
                    .select('*')
                    .in('id', leagueIds)
                    .order('created_at', { ascending: false });
                
                if (leagueError) throw leagueError;
                
                // Separate active and finished competitions
                const now = new Date();
                const activeCompetitions = [];
                const finishedCompetitions = [];
                
                leagues.forEach(league => {
                    const endTime = new Date(league.end_time);
                    if (endTime > now) {
                        activeCompetitions.push(league);
                    } else {
                        finishedCompetitions.push(league);
                    }
                });
                
                // Render competitions
                renderCompetitions('activeCompetitions', activeCompetitions, true);
                renderCompetitions('finishedCompetitions', finishedCompetitions, false);
                
            } catch (error) {
                console.error('Load competitions error:', error);
                document.getElementById('activeCompetitions').innerHTML = '<div class="no-competitions">Kunde inte ladda tävlingar</div>';
                document.getElementById('finishedCompetitions').innerHTML = '<div class="no-competitions">Kunde inte ladda tävlingar</div>';
            }
        }

        async function renderCompetitions(containerId, competitions, isActive) {
            const container = document.getElementById(containerId);
            
            if (competitions.length === 0) {
                container.innerHTML = `<div class="no-competitions">Inga ${isActive ? 'aktiva' : 'avslutade'} tävlingar</div>`;
                return;
            }
            
            // Get user data for each competition to show placement and portfolio value
            const competitionsWithData = await Promise.all(competitions.map(async (league) => {
                try {
                    // Get user's member data for this league
                    const { data: memberData } = await supabaseClient
                        .from('league_members')
                        .select('*')
                        .eq('league_id', league.id)
                        .eq('user_id', currentUser.id)
                        .single();
                    
                    // Get all members to calculate placement
                    const { data: allMembers } = await supabaseClient
                        .from('league_members')
                        .select('balance, portfolio')
                        .eq('league_id', league.id);
                    
                    // Calculate total portfolio value for all members
                    const memberValues = allMembers.map(member => {
                        const portfolioValue = member.portfolio ? Object.values(member.portfolio).reduce((sum, holding) => {
                            return sum + (holding.shares * (holding.current_price || holding.buy_price || 0));
                        }, 0) : 0;
                        return member.balance + portfolioValue;
                    });
                    
                    // Sort by value descending to get placement
                    const sortedValues = [...memberValues].sort((a, b) => b - a);
                    const userValue = memberData.balance + (memberData.portfolio ? Object.values(memberData.portfolio).reduce((sum, holding) => {
                        return sum + (holding.shares * (holding.current_price || holding.buy_price || 0));
                    }, 0) : 0);
                    
                    const placement = sortedValues.indexOf(userValue) + 1;
                    
                    return {
                        ...league,
                        placement,
                        portfolioValue: userValue
                    };
                } catch (error) {
                    console.error('Error getting competition data:', error);
                    return {
                        ...league,
                        placement: '-',
                        portfolioValue: 0
                    };
                }
            }));
            
            const competitionsHTML = competitionsWithData.map(league => {
                return `
                    <div class="competition-item">
                        <div class="competition-info">
                            <div class="competition-name">${league.name}</div>
                            <div class="competition-stats">
                                <div class="competition-stat">
                                    <div class="stat-label">PLACERING</div>
                                    <div class="stat-value placement-value">#${league.placement}</div>
                                </div>
                                <div class="competition-stat">
                                    <div class="stat-label">PORTFÖLJVÄRDE</div>
                                    <div class="stat-value portfolio-value">${league.portfolioValue.toLocaleString('sv-SE')} SEK</div>
                                </div>
                            </div>
                        </div>
                        <button class="join-competition-btn" onclick="joinCompetition('${league.id}', '${league.invite_code}')">
                            ${isActive ? 'Gå till tävling' : 'Visa resultat'}
                        </button>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = competitionsHTML;
        }

        async function joinCompetition(leagueId, inviteCode) {
            try {
                // Check if still a member
                const { data: member } = await supabaseClient
                    .from('league_members')
                    .select('*')
                    .eq('league_id', leagueId)
                    .eq('user_id', currentUser.id)
                    .maybeSingle();
                
                if (member) {
                    // Still a member, redirect to game
                    window.location.href = `game.html?league=${leagueId}&code=${inviteCode}`;
                } else {
                    // No longer a member, rejoin
                    const { data: league } = await supabaseClient
                        .from('leagues')
                        .select('*')
                        .eq('id', leagueId)
                        .single();
                    
                    const { error: memberError } = await supabaseClient
                        .from('league_members')
                        .insert({
                            league_id: leagueId,
                            user_id: currentUser.id,
                            balance: league.starting_balance,
                            portfolio: {}
                        });
                    
                    if (memberError) throw memberError;
                    
                    window.location.href = `game.html?league=${leagueId}&code=${inviteCode}`;
                }
            } catch (error) {
                console.error('Join competition error:', error);
                setGameError('Kunde inte gå med i tävling. Försök igen.');
            }
        }

    </script>
