<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handelsplattform</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

<style>
:root{
--bg:#050505;
--surface:#121212;
--border:#282828;
--accent:#2962ff;
--up:#00ffaa;
--down:#ff3d71;
--text:#ffffff;
--text-dim:#b3b3b3;
}

body{
font-family:'Inter',-apple-system,sans-serif;
background:var(--bg);
color:var(--text);
margin:0;
display:grid;
grid-template-columns:350px 1fr 300px;
height:100vh;
overflow:hidden;
}

.market-side{
display:grid;
grid-template-rows:auto 1fr;
height:100vh;
background:var(--surface);
border-right:1px solid var(--border);
}

.search-box{padding:15px; border-bottom:1px solid var(--border);}

input{
width:100%;
background:#1e1e1e;
border:1px solid var(--border);
padding:10px;
color:white;
border-radius:4px;
box-sizing:border-box;
}

.stock-list{overflow-y:auto; scrollbar-width:thin; padding-right:5px;}

.stock-item{
padding:12px 15px;
border-bottom:1px solid var(--border);
cursor:pointer;
display:flex;
justify-content:space-between;
transition:background 0.2s;
}

.stock-item:hover{background:#1a1a1a;}
.stock-item.active{background:#222; border-left:3px solid var(--accent);}

.main-content{display:flex; flex-direction:column; padding:20px; background:var(--bg); overflow:hidden;}
.chart-container{flex-grow:1; position:relative; min-height:0;}

#activePrice {
    transition: color 0.4s ease;
}

.trade-side{border-left:1px solid var(--border); padding:20px; background:var(--surface);}
.stat-box{margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid var(--border);}

.btn{width:100%; padding:12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer; margin-top:10px;}
.btn-buy{background:var(--up); color:black;}
.btn-sell{background:var(--down); color:white;}

.up{color:var(--up);}
.down{color:var(--down);}
</style>
</head>
<body>

<div class="market-side">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Sök aktie..." oninput="filtreraAktier()">
    </div>
    <div class="stock-list" id="stockList"></div>
</div>

<div class="main-content">
    <div>
        <h2 id="activeSymbol">Välj en aktie</h2>
        <h1 id="activePrice">0.00</h1>
    </div>
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<div class="trade-side">
    <div class="stat-box">
        <div style="color:var(--text-dim)">Tillgängligt saldo</div>
        <div id="balanceDisplay" style="font-size:1.5rem; font-weight:bold;">100 000 SEK</div>
    </div>
    <div id="tradeControls" style="display:none;">
        <label style="font-size:0.8rem; color:var(--text-dim)">ANTAL</label>
        <input type="number" id="tradeAmount" value="1" min="1" style="margin:10px 0 20px 0;">
        <button class="btn btn-buy" onclick="genomförAffär('köp')">KÖP</button>
        <button class="btn btn-sell" onclick="genomförAffär('sälj')">SÄLJ</button>
    </div>
    <div class="portfolio-list" id="portfolioDisplay">
        <h4 style="border-bottom:1px solid var(--border); padding-bottom:5px;">PORTFÖLJ</h4>
    </div>
</div>

<script>
const symboler=[
"Apple (AAPL)","Microsoft (MSFT)","Alphabet Inc (GOOGL)","Amazon (AMZN)","Nvidia (NVDA)","Tesla (TSLA)",
"Meta (META)","Berkshire Hathaway Inc (BRK.B)","United Health Group (UNH)","Visa (V)","JPMorgan Chase & Co (JPM)",
"Johnson & Johnson (JNJ)","Eli Lilly and Company (LLY)", "ExxonMobil Corp (XOM)","Walmart (WMT)","Mastercard (MA)",
"Broadcom (AVGO)","Procter & Gamble (PG)","Oracle Corp (ORCL)","Adobe (ADBE)"
];

let aktier={};
let aktivAktie=null;
let saldo=100000;
let portfölj={};
let chart=null;

const CHART_WINDOW_MS=20*60*1000;
const MAX_CANDLES=120;
const CANDLE_MS=60000;
const PRICE_UPDATE_MS=2000;

function genereraStartCandles(aktie, antal=50){
  let pris = aktie.pris;
  let nu = Date.now();
  let startTid = nu - (antal*CANDLE_MS);
  for(let i=0;i<antal;i++){
    let open = pris;
    let close = open * (1 + (Math.random()-0.5)*0.01);
    let high = Math.max(open, close) + Math.random()*2;
    let low = Math.min(open, close) - Math.random()*2;
    aktie.history.push({x: startTid, o: open, h: high, l: low, c: close});
    pris = close;
    startTid += CANDLE_MS;
  }
  aktie.pris = pris;
}

symboler.forEach(s=>{
    aktier[s]={ticker:s, pris:Math.random()*2000+50, history:[], chartSessionStart:null};
    genereraStartCandles(aktier[s],50);
});

function renderStockList(filter=""){
    const container=document.getElementById('stockList');
    container.innerHTML="";
    const sökord = filter.toLowerCase();
    Object.keys(aktier)
    .filter(s => {
        const parts = s.toLowerCase().split(' (');
        return parts[0].startsWith(sökord) || (parts[1] && parts[1].startsWith(sökord));
    })
    .forEach(s=>{
        const div=document.createElement('div');
        div.className=`stock-item ${aktivAktie===s?'active':''}`;
        div.onclick=()=>väljAktie(s);
        div.innerHTML =`<div><b>${s}</b></div><div style="color:var(--text-dim); font-size:0.9rem;">${aktier[s].pris.toFixed(2)}</div>`;
        container.appendChild(div);
    });
}

function väljAktie(ticker){
    aktivAktie=ticker;
    document.getElementById('tradeControls').style.display='block';
    document.getElementById('activeSymbol').innerText=ticker;
    const el = document.getElementById('activePrice');
    el.innerText = aktier[ticker].pris.toFixed(2) + " SEK";
    el.style.color = "var(--text)";
    initChart();
    renderStockList(document.getElementById('searchInput').value);
}

function uppdateraAktiv(){
    if(!aktivAktie) return;
    const s = aktier[aktivAktie];
    const el = document.getElementById('activePrice');
    const gammaltPris = parseFloat(el.innerText);
    const nyttPris = s.pris;

    el.innerText = nyttPris.toFixed(2) + " SEK";

    if (nyttPris > gammaltPris) el.style.color = "var(--up)";
    else if (nyttPris < gammaltPris) el.style.color = "var(--down)";

    setTimeout(() => { el.style.color = "var(--text)"; }, 700);
}

function initChart(){
    const ctx=document.getElementById('mainChart').getContext('2d');
    if(chart) chart.destroy();
    chart=new Chart(ctx,{
        type:'candlestick',
        data:{datasets:[{data:aktier[aktivAktie].history, color:{up:'#00ffaa',down:'#ff3d71',unchanged:'#00ffaa'}}]},
        options:{
            responsive:true, maintainAspectRatio:false, animation:false,
            plugins:{legend:{display:false}, zoom:{pan:{enabled:true,mode:'xy'},zoom:{wheel:{enabled:true},mode:'xy'}}},
            scales:{
                x:{type:'time', grid:{color:'#1a1a1a'}, ticks:{color:'#666'}},
                y:{grid:{color:'#1a1a1a'}, ticks:{color:'#666'}, grace:'5%'}
            }
        }
    });
}

function genomförAffär(typ){
    let antal=parseInt(document.getElementById('tradeAmount').value);
    if(!aktivAktie||isNaN(antal)||antal<=0) return;
    const pris=aktier[aktivAktie].pris;
    const kostnad=pris*antal;
    if(typ==='köp' && saldo>=kostnad){
        saldo-=kostnad;
        if(!portfölj[aktivAktie]) portfölj[aktivAktie]={antal:0, totaltInköp:0};
        portfölj[aktivAktie].antal+=antal;
        portfölj[aktivAktie].totaltInköp+=kostnad;
    } else if(typ==='sälj' && portfölj[aktivAktie]?.antal>=antal){
        const snitt=portfölj[aktivAktie].totaltInköp/portfölj[aktivAktie].antal;
        saldo+=pris*antal;
        portfölj[aktivAktie].antal-=antal;
        portfölj[aktivAktie].totaltInköp-=snitt*antal;
        if(portfölj[aktivAktie].antal===0) delete portfölj[aktivAktie];
    }
    uppdateraPortfölj();
}

function uppdateraPortfölj(){
    document.getElementById('balanceDisplay').innerText=saldo.toLocaleString('sv-SE', {minimumFractionDigits:2})+" SEK";
    const container=document.getElementById('portfolioDisplay');
    container.innerHTML='<h4 style="border-bottom:1px solid var(--border); padding-bottom:5px;">PORTFÖLJ</h4>';
    for(let s in portfölj){
        const antal = portfölj[s].antal;
        const snitt = portfölj[s].totaltInköp / antal;
        const värde = antal * aktier[s].pris;
        const resultat = värde - portfölj[s].totaltInköp;
        const procent = (resultat / portfölj[s].totaltInköp) * 100;

        container.innerHTML += `
            <div style="margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid #1a1a1a;">
                <div style="display:flex; justify-content:space-between; font-weight:bold;">
                    <span style="cursor:pointer; color:var(--accent);" onclick="väljAktie('${s}')">${s} (${antal} st)</span>
                    <span>${värde.toFixed(0)} kr</span>
                </div>
                <div style="font-size:0.75rem; color:var(--text-dim); margin-top:4px;">
                    Inköpspris: ${snitt.toFixed(2)} kr
                </div>
                <div class="${resultat >= 0 ? 'up' : 'down'}" style="font-size:0.75rem; margin-top:2px;">
                    Resultat: ${resultat >= 0 ? '+' : ''}${resultat.toFixed(0)} kr (${procent.toFixed(2)}%)
                </div>
            </div>`;
    }
}

function filtreraAktier(){ renderStockList(document.getElementById('searchInput').value); }

setInterval(()=>{
    Object.keys(aktier).forEach(s=>{
        let aktie = aktier[s];
        let nyttPris = aktie.pris * (1 + (Math.random()-0.5)*0.005);
        aktie.pris = nyttPris;
        let nu = Date.now();
        let last = aktie.history[aktie.history.length-1];
        if(nu - last.x < CANDLE_MS){
            last.c = nyttPris;
            last.h = Math.max(last.h, nyttPris);
            last.l = Math.min(last.l, nyttPris);
        } else {
            aktie.history.push({x:nu, o:last.c, h:nyttPris, l:nyttPris, c:nyttPris});
            if(aktie.history.length > MAX_CANDLES) aktie.history.shift();
        }
    });
    uppdateraAktiv();
    uppdateraPortfölj();
    if(chart && aktivAktie){
        chart.data.datasets[0].data = aktier[aktivAktie].history;
        chart.update('none');
    }
    renderStockList(document.getElementById('searchInput').value);
}, PRICE_UPDATE_MS);

renderStockList();
uppdateraPortfölj();
</script>
</body>
</html>
