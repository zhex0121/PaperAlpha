<!DOCTYPE html>
<html lang="sv">
<head>
<link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
<link rel="manifest" href="assets/icons/site.webmanifest">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lär dig - PaperAlpha</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');
 
        :root {
            --bg: #050505;
            --surface: #121212;
            --border: #282828;
            --accent: #2962ff;
            --up: #00ffaa;
            --down: #ff3d71;
            --text: #ffffff;
            --text-dim: #b3b3b3;
            --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
        }
 
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            font-family: 'Space Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            position: relative;
        }
 
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(41, 98, 255, 0.1) 0%, transparent 45%),
                radial-gradient(circle at 75% 20%, rgba(0, 255, 170, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(41, 98, 255, 0.05) 0%, transparent 40%);
            z-index: 0;
            pointer-events: none;
        }
 
        .top-banner {
            height: 64px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 20px;
            background: var(--glass);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
        }
 
        .logo-link {
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent), var(--up));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
 
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin-top: 64px;
            padding-bottom: 40px;
        }
 
        .hero-section {
            flex: 0 0 auto;
            min-height: 45vh;
            display: flex;
            align-items: center;
            padding: 40px 20px;
            border-bottom: 1px solid var(--glass-border);
        }
 
        .hero-text {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--accent), var(--up));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            max-width: 90%;
        }
 
        .lessons-scroll {
            flex: 1;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
 
        .lesson-item {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: center;
            padding: 24px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            max-width: 1080px;
            margin: 0 auto;
            width: 100%;
        }
 
        .lesson-item:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }
 
        .video-player-container {
            position: relative;
            width: 100%;
            max-width: 360px;
            aspect-ratio: 9 / 16;
            background: rgba(10, 10, 10, 0.8);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            margin: 0 auto;
        }
 
        .video-thumbnail {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
        }
 
        .play-button {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent), var(--up));
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(41, 98, 255, 0.4);
            z-index: 10;
            position: relative;
        }
 
        .play-button:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 32px rgba(41, 98, 255, 0.6);
        }
 
        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 24px solid var(--bg);
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            margin-left: 4px;
        }
 
        .lesson-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
 
        .lesson-title {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.2;
        }
 
        .lesson-description {
            font-size: 1rem;
            color: var(--text-dim);
            line-height: 1.4;
        }
 
        /* Fullscreen video modal */
        .video-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 200;
        }
 
        .video-modal.active {
            display: flex;
            flex-direction: column;
        }
 
        .video-modal-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
 
        .video-modal video {
            width: auto;
    height: 100%;
    max-width: calc(100% * 9 / 16);
    max-height: 100vh;
}
 
        .close-button {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            color: var(--text);
            font-size: 1.2rem;
            font-weight: 600;
            z-index: 10;
        }
 
        .close-button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent);
        }
 
        @media (max-width: 768px) {
            .lesson-item {
                grid-template-columns: 1fr;
                gap: 16px;
            }
 
            .hero-text {
                font-size: clamp(1.8rem, 4vw, 2.8rem);
            }
 
            .play-button {
                width: 60px;
                height: 60px;
            }
 
            .play-button::after {
                border-left: 18px solid var(--bg);
                border-top: 12px solid transparent;
                border-bottom: 12px solid transparent;
            }
        }
    </style>
</head>
<body>
    <header class="top-banner">
        <a href="index.html" class="logo-link">PaperAlpha</a>
    </header>
 
    <main class="container">
        <section class="hero-section">
            <h1 class="hero-text">Lär dig trading</h1>
        </section>
 
        <section class="lessons-scroll">
            <article class="lesson-item" data-video="https://github.com/user-attachments/assets/f1d0e7e6-139e-4f3b-9d26-de5defa1dc91"> 
                <div class="video-player-container">
                    <img class="video-thumbnail" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 360 640'%3E%3Crect fill='%23222' width='360' height='640'/%3E%3Ccircle cx='180' cy='320' r='50' fill='%232962ff'/%3E%3Cpolygon points='165,300 165,340 200,320' fill='%23050505'/%3E%3C/svg%3E" alt="Video thumbnail">
                    <button class="play-button" aria-label="Play video"></button>
                </div>
                <div class="lesson-info">
                    <h2 class="lesson-title">Aktier</h2>
                    <p class="lesson-description">Grundläggande kunskaper om aktier.</p>
                </div>
            </article>
        </section>
    </main>
 
    <!-- Fullscreen video modal -->
    <div class="video-modal" id="videoModal">
        <div class="video-modal-content">
            <button class="close-button" id="closeButton" aria-label="Close video">✕</button>
            <video id="videoPlayer" controls>
                <source src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
 
    <script>
        const videoModal = document.getElementById('videoModal');
        const videoPlayer = document.getElementById('videoPlayer');
        const closeButton = document.getElementById('closeButton');
        const lessonItems = document.querySelectorAll('.lesson-item');
 
        // Extract thumbnail from video and display it
        function extractThumbnail(videoUrl, thumbnailImg) {
            const video = document.createElement('video');
            video.src = videoUrl;
            video.crossOrigin = 'anonymous';
            
            video.addEventListener('loadedmetadata', () => {
                // Seek to a small time to get the first frame
                video.currentTime = 0.1;
            });
            
            video.addEventListener('seeked', () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                thumbnailImg.src = canvas.toDataURL();
            }, { once: true });
        }
 
        lessonItems.forEach(item => {
            const playButton = item.querySelector('.play-button');
            const thumbnailImg = item.querySelector('.video-thumbnail');
            const videoSrc = item.dataset.video;
 
            // Load thumbnail
            extractThumbnail(videoSrc, thumbnailImg);
 
            playButton.addEventListener('click', (e) => {
                e.preventDefault();
                videoPlayer.src = videoSrc;
                videoModal.classList.add('active');
                videoPlayer.play();
                // Prevent body scroll when modal is open
                document.body.style.overflow = 'hidden';
            });
 
            item.addEventListener('click', (e) => {
                if (e.target !== playButton && !playButton.contains(e.target)) return;
            });
        });
 
        closeButton.addEventListener('click', () => {
            videoModal.classList.remove('active');
            videoPlayer.pause();
            videoPlayer.currentTime = 0;
            document.body.style.overflow = '';
        });
 
        // Close modal when pressing Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && videoModal.classList.contains('active')) {
                videoModal.classList.remove('active');
                videoPlayer.pause();
                videoPlayer.currentTime = 0;
                document.body.style.overflow = '';
            }
        });
    </script>
</body>
</html>
